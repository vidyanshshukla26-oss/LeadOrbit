<!DOCTYPE html>
<html lang="en">

<head>
        <!-- SEO Meta Tags -->
    <title>LeadOrbit - Login</title>
    <meta name="description" content="LeadOrbit - Login to your account. Manage leads, campaigns, and outreach.">
    <meta name="keywords" content="lead management, outreach, CRM, login">
    <meta name="author" content="LeadOrbit Team">
    <meta property="og:title" content="LeadOrbit - Login">
    <meta property="og:description" content="Login to LeadOrbit to manage your leads and campaigns.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="LeadOrbit">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LeadOrbit - Login">
    <meta name="twitter:description" content="Login to LeadOrbit - AI-powered outreach platform.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./theme-boot.js"></script>
    <title>Login - LeadOrbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="./theme.css" rel="stylesheet">

    <!-- Explicit overrides to bypass theme.css light-mode defaults -->
    <style>
        body.auth-page {
            /* Using the deep dark blue sidebar theme base from the dashboard */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            font-family: 'Manrope', sans-serif;
            min-vh-100: 100vh;
        }
        .custom-glass-card {
            background: rgba(30, 41, 59, 0.7) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 20px;
        }
        .brand-gradient {
            background: linear-gradient(45deg, #00b4db, #00ffca) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            color: transparent !important; /* Fallback */
            display: inline-block; /* Essential for text gradients to calculate widths */
        }
        .custom-input {
            background-color: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }
        .custom-input:focus {
            background-color: rgba(15, 23, 42, 0.8) !important;
            border-color: #00b4db !important;
            box-shadow: 0 0 0 0.25rem rgba(0, 180, 219, 0.25) !important;
            color: #ffffff !important;
        }
        .input-group-text-custom {
            background-color: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-right: none !important;
            color: rgba(255, 255, 255, 0.5) !important;
        }
    </style>
</head>

<body class="auth-page d-flex align-items-center min-vh-100">
  
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <!-- Applied our custom glass styles -->
                <div class="custom-glass-card p-4 shadow-lg">
                    <div class="card-body">

                       <div class="mb-3">
                            <a href="/" class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-2">
                                <span>&larr;</span>
                                <span>Back to Home</span>
                            </a>
                        </div>
                        
                        <div class="text-center mb-4">
                            <!-- Applied the premium brand gradient -->
                            <h2 class="brand-gradient mb-1" style="font-family: 'Sora', sans-serif; font-weight: 800; font-size: 2.5rem;">LeadOrbit</h2>
                            <p class="text-white-50 small">Welcome back! Please enter your details.</p>
                        </div>

                        <form aria-label="Login form">
                            <div class="mb-3">
                                <label for="floatingInput" class="form-label text-white-50 small fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text input-group-text-custom">
                                        <i class="bi bi-envelope" aria-hidden="true"></i>
                                    </span>
                                    <input type="email" class="form-control form-control-lg fs-6 custom-input style-init" id="floatingInput"  autocomplete="email"
                                        placeholder="name@example.com" required style="border-left: none !important;">
                                </div>
                            </div>
                            </div>

<div class="mb-4">
    <label for="floatingPassword" class="form-label text-muted small fw-semibold">
        Password
    </label>

    <div class="password-toggle-wrapper">
        <input
            type="password"
            class="form-control form-control-lg fs-6 custom-input"
            id="floatingPassword"
            placeholder="Password"
            required
        >

        <button
            type="button"
            id="floatingPasswordToggle"
            class="password-toggle-btn"
            aria-label="Show password"
            aria-pressed="false"
        >
            <i class="bi bi-eye" aria-hidden="true"></i>
        </button>
    </div>
</div>

<div class="d-grid mb-3">
                                <button class="btn btn-lg fw-semibold text-dark" style="background: linear-gradient(45deg, #00b4db, #00ffca); border: none;" type="submit">Sign In</button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0 small text-white-50">Don't have an account? <a href="/register.html"
                                    class="text-decoration-none fw-semibold" style="color: #00ffca;">Create one</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./main.js"></script>
    <script type="module">
        import { login } from './api.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('floatingInput').value;
                    const password = document.getElementById('floatingPassword').value;
                    try {
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = true;
                        btn.textContent = 'Signing In...';
                        await login(email, password);
                        window.location.href = '/dashboard.html';
                    } catch (err) {
                        alert('Login failed. Please check your credentials.');
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = false;
                        btn.textContent = 'Sign In';
                    }
                });
            }
        });
    </script>
</body>

</html>
