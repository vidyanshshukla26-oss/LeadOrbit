<!DOCTYPE html>
<html lang="en">

<head>
        <!-- SEO Meta Tags -->
    <title>LeadOrbit - Register</title>
    <meta name="description" content="LeadOrbit - Create your account. Start managing leads and campaigns.">
    <meta name="keywords" content="lead management, outreach, CRM, register, signup">
    <meta name="author" content="LeadOrbit Team">
    <meta property="og:title" content="LeadOrbit - Register">
    <meta property="og:description" content="Create your LeadOrbit account to start managing leads.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="LeadOrbit">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LeadOrbit - Register">
    <meta name="twitter:description" content="Sign up for LeadOrbit - AI-powered lead management.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./theme-boot.js"></script>
    <!-- Clean Page Title -->
    <title>Register - LeadOrbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Loaded Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Loaded Google Fonts (Manrope + Sora) -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="./theme.css" rel="stylesheet">

    <!-- Shared theme overrides for complete UI consistency -->
    <style>
        body.auth-page {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            font-family: 'Manrope', sans-serif;
        }
        .custom-glass-card {
            background: rgba(30, 41, 59, 0.7) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 20px;
        }
        .brand-gradient {
            background: linear-gradient(45deg, #00b4db, #00ffca) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            color: transparent !important;
            display: inline-block;
        }
        .custom-input {
            background-color: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }
        .custom-input:focus {
            background-color: rgba(15, 23, 42, 0.8) !important;
            border-color: #00b4db !important;
            box-shadow: 0 0 0 0.25rem rgba(0, 180, 219, 0.25) !important;
            color: #ffffff !important;
        }
        .input-group-text-custom {
            background-color: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-right: none !important;
            color: rgba(255, 255, 255, 0.5) !important;
        }
    </style>
</head>

<body class="auth-page d-flex align-items-center min-vh-100">
  
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <!-- Applied our custom glass style container -->
                <div class="custom-glass-card p-4 shadow-lg">
                    <div class="card-body">

                        <div class="mb-3">
                            <a href="/" class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-2">
                                <span>&larr;</span>
                                <span>Back to Home</span>
                            </a>
                        </div>

                        <div class="text-center mb-4">
                            <h2 class="brand-gradient mb-1" style="font-family: 'Sora', sans-serif; font-weight: 800; font-size: 2.5rem;">LeadOrbit</h2>
                            <p class="text-white-50 small">Create your account to get started.</p>
                        </div>

                        <form aria-label="Registration form">
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label for="firstName" class="form-label text-white-50 small fw-semibold">First Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text  input-group-text-custom"><i class="bi bi-person" aria-hidden="true" ></i></span>
                                        <input type="text" class="form-control form-control-lg fs-6 custom-input" id="firstName" autocomplete="given-name"
                                            placeholder="Jane" required style="border-left: none !important;">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <label for="lastName" class="form-label text-white-50 small fw-semibold">Last Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text input-group-text-custom"><i class="bi bi-person" aria-hidden="true"></i></span>
                                        <input type="text" class="form-control form-control-lg fs-6 custom-input" id="lastName"  autocomplete="family-name"
                                            placeholder="Doe" required style="border-left: none !important;">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="emailAddress" class="form-label text-white-50 small fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text input-group-text-custom"><i class="bi bi-envelope" aria-hidden="true"></i></span>
                                    <input type="email" class="form-control form-control-lg fs-6 custom-input" id="emailAddress"  autocomplete="email"
                                        placeholder="name@example.com" required style="border-left: none !important;">
                                </div>
                            </div>
                            <div class="mb-4">
    <label for="password"
        class="form-label text-muted small fw-semibold">
        Password
    </label>

    <div class="password-toggle-wrapper">
        <input
            type="password"
            class="form-control form-control-lg fs-6 custom-input"
            id="password"
            placeholder="Min. 8 characters"
            required
        >

        <button
            type="button"
            id="passwordToggle"
            class="password-toggle-btn"
            aria-label="Show password"
            aria-pressed="false"
        >
            <i class="bi bi-eye" aria-hidden="true"></i>
        </button>
    </div>
</div>

                            <div class="d-grid mb-3">
                                <button class="btn btn-lg fw-semibold text-dark" style="background: linear-gradient(45deg, #00b4db, #00ffca); border: none;" type="submit">Sign Up</button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0 small text-white-50">Already have an account? <a href="/login.html"
                                    class="text-decoration-none fw-semibold" style="color: #00ffca;">Sign in</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./main.js"></script>
    <script type="module">
        import { register } from './api.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const first_name = document.getElementById('firstName').value;
                    const last_name = document.getElementById('lastName').value;
                    const email = document.getElementById('emailAddress').value;
                    const password = document.getElementById('password').value;

                    const organization_name = first_name + "'s Organization";

                    try {
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Signing up...';

                        await register({
                            first_name, last_name, email, password, organization_name
                        });

                        window.location.href = '/dashboard.html';
                    } catch (err) {
                        alert('Registration failed. Please try again.');
                        const btn = form.querySelector('button[type="submit"]');
                        btn.disabled = false;
                        btn.textContent = 'Sign Up';
                    }
                });
            }
        });
    </script>
</body>

</html>
