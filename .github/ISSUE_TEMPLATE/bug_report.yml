name: Bug Report
description: Report a bug to help us improve LeadOrbit
title: "[Bug]: "
labels: ["bug"]

body:

* type: markdown
  attributes:
  value: |
  Thanks for taking the time to fill out this bug report!

* type: textarea
  id: description
  attributes:
  label: Bug Description
  description: A clear and concise description of the bug.
  placeholder: Describe the bug...
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to Reproduce
  description: Steps to reproduce the behavior.
  placeholder: |
  1. Go to '...'
  2. Click on '...'
  3. Perform an action
  4. See the error
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected Behavior
  description: What did you expect to happen?
  placeholder: Describe the expected behavior...
  validations:
  required: true

* type: textarea
  id: actual
  attributes:
  label: Actual Behavior
  description: What actually happened?
  placeholder: Describe the actual behavior...
  validations:
  required: true

* type: textarea
  id: screenshots
  attributes:
  label: Screenshots
  description: If applicable, add screenshots to help explain the issue.
  placeholder: Drag and drop screenshots here...
  validations:
  required: false

* type: dropdown
  id: os
  attributes:
  label: Operating System
  options:
  - Windows
  - macOS
  - Linux
  - Other
  validations:
  required: true

* type: dropdown
  id: browser
  attributes:
  label: Browser
  options:
  - Chrome
  - Firefox
  - Safari
  - Edge
  - Other
  validations:
  required: true

* type: textarea
  id: additional
  attributes:
  label: Additional Context
  description: Add any other context, logs, or details about the issue.
  placeholder: Additional information...
  validations:
  required: false
